# Fichier de surcharge pour le développement
# Ce fichier est automatiquement chargé par docker-compose
# et permet de surcharger les valeurs du docker-compose.yml principal

services:
  smtp-server:
    environment:
      # Valeurs par défaut si les variables .env ne sont pas définies
      - SMTP_TLS_ADDR=${SMTP_TLS_ADDR:-0.0.0.0:8465}
      - SMTP_PLAIN_ADDR=${SMTP_PLAIN_ADDR:-0.0.0.0:8025}
      - CERT_PATH=/app/certs/${CERT_PATH:-localhost.crt}
      - KEY_PATH=/app/certs/${KEY_PATH:-localhost.key}
      - SMTP_USERNAME=${SMTP_USERNAME:-admin}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-password123}
      - RUST_LOG=${RUST_LOG:-debug}

  email-api:
    environment:
      - API_SERVER_ADDR=${API_SERVER_ADDR:-0.0.0.0:8000}
      - FULLCHAIN_PATH=/app/certs/${FULLCHAIN_PATH:-fullchain.pem}
      - PRIVKEY_PATH=/app/certs/${PRIVKEY_PATH:-privkey.pem}
      - SMTP_USERNAME=${SMTP_USERNAME:-admin}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-password123}
      - RUST_LOG=${RUST_LOG:-debug}

  imap-server:
    environment:
      - IMAP_SERVER=${IMAP_SERVER:-0.0.0.0:143}
      - IMAP_SERVER_API_PORT=${IMAP_SERVER_API_PORT:-8080}
      - MONGODB_USERNAME=${MONGODB_USERNAME:-}
      - MONGODB_PASSWORD=${MONGODB_PASSWORD:-}
      - MONGODB_CLUSTER_URL=${MONGODB_CLUSTER_URL:-}
      - MONGODB_APP_NAME=${MONGODB_APP_NAME:-mailserver}
      - RUST_LOG=${RUST_LOG:-debug} 